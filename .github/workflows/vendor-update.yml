name: Vendor update

# Daily check for new upstream releases of `igraph` and `libleidenalg`.
#
# What it does:
#   1. Run `scripts/bump-vendor.mjs`, which:
#      - asks GitHub for the latest release tag of each upstream,
#      - checks out that tag in the submodule,
#      - rewrites the `*_VERSION_FALLBACK` constants in
#        `scripts/build-deps.mjs`,
#      - rewrites the "Vendored upstream" version block in `README.md`.
#   2. If anything changed, open / update a PR titled
#      `chore(vendor): bump <name> to <version>`.
#
# The PR runs through the full CI matrix (Linux / macOS / Windows × Node
# 22 / 24 / 26 + ASan/UBSan) before a human merges it. We deliberately do
# NOT auto-merge: a submodule bump in the inner partition algorithm can
# change deterministic community ids and the human reviewer needs to
# decide whether that's a breaking change.

on:
  schedule:
    # 06:00 UTC daily — picks up upstream releases cut the previous day.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: vendor-update
  cancel-in-progress: false

jobs:
  bump:
    name: Bump vendor submodules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # We need a token that can push branches and open PRs. The
          # default GITHUB_TOKEN works; if you want the PR to trigger
          # downstream workflows, swap for a fine-grained PAT (see
          # https://github.com/peter-evans/create-pull-request#workarounds-to-trigger-further-workflow-runs).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run vendor bump
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          summary="$(node scripts/bump-vendor.mjs)"
          echo "summary=${summary}" >> "$GITHUB_OUTPUT"
          echo "$summary" | python3 -m json.tool || echo "$summary"

      - name: Render PR title and body
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          summary='${{ steps.bump.outputs.summary }}'
          changed=$(node -e "const s = JSON.parse(process.argv[1]); console.log(s.changed.map(c => c.name + '@' + c.version).join(', '))" "$summary")
          if [ -z "$changed" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
          else
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "body<<__BODY_EOF__"
            echo "Automated submodule update from \`scripts/bump-vendor.mjs\`."
            echo ""
            echo "**Targets**:"
            node -e "const s = JSON.parse(process.argv[1]); for (const c of s.changed) console.log('- \`' + c.name + '\` → \`' + c.version + '\` (was \`' + c.previousSha.slice(0,12) + '\`, now \`' + c.newSha.slice(0,12) + '\`)'); for (const c of s.unchanged) console.log('- \`' + c.name + '\` already at \`' + c.version + '\` — no change')" "$summary"
            echo ""
            echo "Generated by \`.github/workflows/vendor-update.yml\`."
            echo "__BODY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create / update PR
        if: steps.meta.outputs.changed != ''
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(vendor): bump ${{ steps.meta.outputs.changed }}"
          branch: chore/vendor-update
          delete-branch: true
          title: "chore(vendor): bump ${{ steps.meta.outputs.changed }}"
          body: ${{ steps.meta.outputs.body }}
          labels: |
            dependencies
            vendor
          add-paths: |
            vendor/igraph
            vendor/libleidenalg
            scripts/build-deps.mjs
            README.md

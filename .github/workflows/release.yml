name: Release

# Changesets-driven release for a native Node addon.
#
# Two distinct paths on a push to `main`:
#
#   1. There ARE pending changesets in `.changeset/*.md` (and they aren't
#      just the README): this is a feature merge. We open / update the
#      "Version Packages" PR via changesets/action; no publish.
#
#   2. There are NO pending changesets: this is the merge of the Version
#      Packages PR. We build platform prebuilds in parallel, download every
#      artifact into `prebuilds/<platform>-<arch>/`, refuse to publish if
#      any platform from the supported matrix is missing, and only then
#      call `changeset publish` to push the tarball (with all prebuilds)
#      to npm.
#
# Authentication uses npm Trusted Publishers (OIDC) — no NPM_TOKEN is
# required; the `id-token: write` permission below brokers it. Configure
# the package's npm page to trust this repo + workflow before the first
# publish.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Matrix kept in one place so prebuild + publish can't drift apart. Mirror
# this in README "Install model" if you add or remove a target.
#
# PREBUILD_ARTIFACTS is the list of artifact names produced by the
# matrix below — one entry per matrix combination. PREBUILD_DIRS is the
# distinct list of `prebuilds/<dir>/` outputs in the final tarball; Linux
# glibc + musl share a directory (libc tag goes in the filename via
# prebuildify --tag-libc), so the two lists differ in length.
env:
  PREBUILD_ARTIFACTS: "linux-x64-glibc linux-x64-musl linux-arm64-glibc linux-arm64-musl darwin-arm64 win32-x64"
  PREBUILD_DIRS: "linux-x64 linux-arm64 darwin-arm64 win32-x64"

jobs:
  check:
    name: Check release readiness
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.check.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v6

      - id: check
        shell: bash
        run: |
          # A non-README .md under .changeset/ means a release is queued
          # behind a Version Packages PR. No file means the PR has been
          # merged and we're ready to publish.
          pending="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | head -n 1 || true)"
          if [ -n "${pending}" ]; then
            echo "hasChangesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets present: ${pending}"
          else
            echo "hasChangesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — release path"
          fi

  release-pr:
    name: Open / update Release PR
    needs: check
    if: needs.check.outputs.hasChangesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          # Empty publish: this run only opens / updates the Version
          # Packages PR. The actual publish happens on the next push to
          # main (the merge of that PR), via the prebuild + publish jobs
          # below.
          publish: ""
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prebuild:
    # The job is NOT gated by `if:` at the job level — that would skip
    # matrix expansion in the UI and every row would render with the
    # literal `Prebuild ${{ matrix.artifact }}` label. Each step is
    # gated on `hasChangesets == 'false'` instead, so Release-PR runs
    # spin up runners for ~10s and exit with everything skipped. The
    # one trap that needs care: the very first step CANNOT use
    # `shell: bash` because the musl rows run inside `node:22-alpine`,
    # which doesn't ship bash until the `Install Alpine build deps`
    # step below installs it — so the "Note Release-PR path" step uses
    # `shell: sh` to stay POSIX-compatible across Ubuntu and Alpine.
    name: Prebuild ${{ matrix.artifact }}
    needs: check
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      # Any platform missing aborts the publish — we never want to ship a
      # tarball with a hole in the prebuild matrix that silently falls
      # through to source build on consumer machines.
      fail-fast: true
      matrix:
        include:
          # `artifact` is the per-target artifact name and also the row
          # label in the GitHub UI. `target` is the prebuilds/<target>/
          # directory prebuildify writes into; glibc and musl Linux builds
          # share a directory but their filenames diverge via --tag-libc.
          - artifact: linux-x64-glibc
            os: ubuntu-latest
            container: ""
            target: linux-x64
            libc: glibc
          - artifact: linux-x64-musl
            os: ubuntu-latest
            container: node:22-alpine
            target: linux-x64
            libc: musl
          - artifact: linux-arm64-glibc
            os: ubuntu-24.04-arm
            container: ""
            target: linux-arm64
            libc: glibc
          # linux-arm64-musl: GitHub Actions doesn't support
          # JavaScript-based actions (actions/checkout, …) inside
          # Alpine containers on arm64 runners — the embedded Node in
          # those actions is x64-musl only, so a job-level
          # `container: node:22-alpine` on `ubuntu-24.04-arm` dies at
          # actions/checkout with "JavaScript Actions in Alpine
          # containers are only supported on x64 Linux runners".
          # Workaround: keep the job on the glibc arm64 host so
          # actions/checkout runs natively, and execute the build
          # itself inside a `docker run node:22-alpine` invocation
          # mounted onto the workspace. Output lands in
          # `prebuilds/linux-arm64/*.musl.node` on the host so
          # `actions/upload-artifact` picks it up unchanged.
          - artifact: linux-arm64-musl
            os: ubuntu-24.04-arm
            container: ""
            target: linux-arm64
            libc: musl
            dockerized_musl: true
          - artifact: darwin-arm64
            os: macos-latest
            container: ""
            target: darwin-arm64
            libc: ""
          # darwin-x64 (Intel Mac) is intentionally not in the prebuild
          # matrix. GitHub retired `macos-13` runners and the modern free
          # `macos-latest` is arm64-only; cross-compiling from arm64 to
          # x86_64 works but the test step can't validate the binary
          # without Rosetta on a self-hosted runner. Intel Mac users are
          # served by the Tier 2 source-build path documented in README.
          - artifact: win32-x64
            os: windows-latest
            container: ""
            target: win32-x64
            libc: ""
    steps:
      - name: Note Release-PR path (skipping prebuild)
        if: needs.check.outputs.hasChangesets == 'true'
        # `sh`, not bash — the musl rows run inside `node:22-alpine`
        # and bash isn't installed until the Alpine deps step below.
        shell: sh
        run: |
          echo "Pending changesets exist; this run only opens the Release PR."
          echo "No prebuild for ${{ matrix.artifact }} on this push."

      # Alpine doesn't ship the build toolchain prebuildify needs. Install
      # it before the rest of the actions run — pnpm/action-setup pulls
      # via curl which also needs the package manager seeded. `bison` +
      # `flex` are required because igraph's `src/CMakeLists.txt` invokes
      # `bison_target()` / `flex_target()` unconditionally (same reason
      # as Windows, see the matching choco step further down). Only fires
      # for the job-level-container Alpine rows (linux-x64-musl); the
      # arm64-musl row runs on the glibc host and does its apk add inside
      # the `docker run` step further down.
      - name: Install Alpine build deps
        if: needs.check.outputs.hasChangesets == 'false' && matrix.libc == 'musl' && !matrix.dockerized_musl
        shell: sh
        run: |
          apk add --no-cache \
            bash \
            bison \
            build-base \
            cmake \
            flex \
            git \
            linux-headers \
            python3 \
            curl

      - uses: actions/checkout@v6
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        if: needs.check.outputs.hasChangesets == 'false' && !matrix.dockerized_musl

      - uses: actions/setup-node@v6
        if: needs.check.outputs.hasChangesets == 'false' && !matrix.dockerized_musl
        with:
          node-version: 22
          cache: pnpm

      # Windows runners don't include bison / flex. See the matching
      # step in ci.yml for the full rationale.
      - name: Install bison + flex (Windows)
        if: needs.check.outputs.hasChangesets == 'false' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install --no-progress -y winflexbison3
          $tool = (Get-ChildItem -Path "$env:ChocolateyInstall\lib\winflexbison3\tools" -Filter "win_bison.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $tool) { throw "win_bison.exe not found after install" }
          $dir = Split-Path $tool
          echo "BISON_EXECUTABLE=$dir\win_bison.exe" >> $env:GITHUB_ENV
          echo "FLEX_EXECUTABLE=$dir\win_flex.exe"  >> $env:GITHUB_ENV
          echo "$dir" >> $env:GITHUB_PATH

      - run: pnpm install --frozen-lockfile --ignore-scripts
        if: needs.check.outputs.hasChangesets == 'false' && !matrix.dockerized_musl

      - name: Build prebuild
        if: needs.check.outputs.hasChangesets == 'false' && !matrix.dockerized_musl
        env:
          # When this is a libc-tagged build, point prebuildify at it so
          # the artifact file lands as `<name>.<libc>.node` and
          # node-gyp-build can pick the right one at runtime.
          PREBUILDIFY_LIBC: ${{ matrix.libc }}
        run: pnpm run prebuild

      # linux-arm64-musl: host is glibc arm64 Ubuntu (so checkout etc.
      # work), but the build needs to produce an arm64-musl `.node`.
      # `node:22-alpine` is a multi-arch manifest; on an arm64 host
      # Docker pulls the arm64 variant automatically, so the resulting
      # binary is arm64-musl. We do the full pnpm install + prebuild
      # inside the container so every native dep (node-gyp, prebuildify,
      # the addon itself) is built against musl libc. Output lands in
      # the host workspace via the volume mount and the regular
      # `Upload prebuild artifact` step below picks it up.
      - name: Build prebuild (Alpine arm64 via docker)
        if: needs.check.outputs.hasChangesets == 'false' && matrix.dockerized_musl
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            -e PREBUILDIFY_LIBC=musl \
            node:22-alpine sh -c '
              set -e
              apk add --no-cache bash bison build-base cmake flex git linux-headers python3 curl
              # Trust the workspace path even though uid mapping differs
              # between host and container (root inside vs runner user
              # outside) — without this, the `git describe --tags` calls
              # in build-deps.mjs trip "detected dubious ownership".
              git config --global --add safe.directory /workspace
              git config --global --add safe.directory /workspace/vendor/igraph
              git config --global --add safe.directory /workspace/vendor/libleidenalg
              npm install -g pnpm@9.15.9
              pnpm install --frozen-lockfile --ignore-scripts
              pnpm run prebuild
              # Make the output readable by the runner user on the host
              # (apk add ran as root, files would otherwise be 0644 root).
              chmod -R a+r prebuilds || true
            '

      - name: Upload prebuild artifact
        if: needs.check.outputs.hasChangesets == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.artifact }}
          path: prebuilds/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to npm
    needs: [check, prebuild]
    # Same pattern as `prebuild`: step-level gating keeps the UI label
    # clean on Release-PR runs (`Publish to npm — Skipped`) instead of
    # showing the literal job name with no matrix interpolation.
    runs-on: ubuntu-latest
    steps:
      - name: Note Release-PR path (skipping publish)
        if: needs.check.outputs.hasChangesets == 'true'
        shell: bash
        run: echo "Pending changesets exist; nothing to publish on this push."

      - uses: actions/checkout@v6
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v6
        if: needs.check.outputs.hasChangesets == 'false'

      - uses: actions/setup-node@v6
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
        if: needs.check.outputs.hasChangesets == 'false'

      - name: Build TypeScript output
        if: needs.check.outputs.hasChangesets == 'false'
        run: pnpm build:ts

      - name: Download every prebuild artifact
        if: needs.check.outputs.hasChangesets == 'false'
        uses: actions/download-artifact@v8
        with:
          path: prebuilds-staging
          pattern: prebuild-*

      - name: Stage prebuilds at prebuilds/<dir>/
        if: needs.check.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p prebuilds
          for d in prebuilds-staging/prebuild-*/; do
            artifact="${d#prebuilds-staging/prebuild-}"
            artifact="${artifact%/}"
            # Strip libc suffix from the artifact name to get the directory
            # prebuilds/<dir>/ that node-gyp-build resolves at runtime.
            # glibc + musl share a directory; libc tag is in the filename.
            target="${artifact%-glibc}"
            target="${target%-musl}"
            mkdir -p "prebuilds/${target}"
            # `cp` (not `mv`) so the staging tree stays intact for the
            # next step's per-artifact verification.
            cp -r "${d}"* "prebuilds/${target}/"
          done
          ls -la prebuilds/

      - name: Verify every artifact + directory is present
        if: needs.check.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          # Every matrix entry must have produced a non-empty artifact.
          for artifact in $PREBUILD_ARTIFACTS; do
            if ! ls "prebuilds-staging/prebuild-${artifact}/"*.node >/dev/null 2>&1; then
              echo "MISSING artifact: prebuild-${artifact}"
              missing=1
            fi
          done
          # Every published <prebuilds/dir>/ must end up with at least one
          # .node file after staging. Catches a future rename mismatch in
          # the staging step.
          for dir in $PREBUILD_DIRS; do
            if ! ls "prebuilds/${dir}"/*.node >/dev/null 2>&1; then
              echo "MISSING staged prebuilds/${dir}/"
              missing=1
            fi
          done
          # Linux x64 and Linux arm64 must each carry BOTH a glibc and a
          # musl binary so musl consumers (Alpine, distroless musl) don't
          # silently fall through to the source build on either arch.
          for arch in x64 arm64; do
            if ! ls "prebuilds/linux-${arch}"/*.musl.node >/dev/null 2>&1; then
              echo "MISSING musl-tagged binary under prebuilds/linux-${arch}/"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "Refusing to publish: prebuild matrix is incomplete."
            exit 1
          fi
          echo "All artifacts present: ${PREBUILD_ARTIFACTS}"
          echo "All directories present: ${PREBUILD_DIRS}"

      - name: Inspect tarball contents (sanity check)
        if: needs.check.outputs.hasChangesets == 'false'
        run: |
          pnpm pack --pack-destination /tmp
          ls -la /tmp/fast-leiden-*.tgz
          tar -tzf /tmp/fast-leiden-*.tgz | grep '^package/prebuilds/'

      - name: Generate SBOM (CycloneDX)
        id: sbom
        if: needs.check.outputs.hasChangesets == 'false'
        # Best-effort: failure here does NOT block npm publish (see
        # `continue-on-error` below). SBOM is a nice-to-have asset on the
        # GitHub Release; the package itself is fully signed via npm
        # provenance.
        #
        # `@cyclonedx/cyclonedx-npm` shells out to `npm ls`, which needs a
        # `package-lock.json` to enumerate the tree. We use pnpm in CI and
        # don't ship a package-lock, so we synthesise one with
        # `npm install --package-lock-only`. `--legacy-peer-deps` tolerates
        # the rollup/vite peer-dep churn that npm's strict resolver
        # rejects but pnpm doesn't care about.
        continue-on-error: true
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --omit dev \
            --output-format JSON \
            --output-file sbom.cdx.json
          ls -la sbom.cdx.json
          # Echo a short summary into the job log so reviewers can sanity
          # check what landed in the SBOM without downloading the artifact.
          node -e "const s=require('./sbom.cdx.json'); console.log('SBOM components:', (s.components||[]).length, 'serial:', s.serialNumber);"

      - name: Upload SBOM artifact
        if: needs.check.outputs.hasChangesets == 'false' && steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cdx
          path: sbom.cdx.json
          if-no-files-found: warn
          retention-days: 365

      - name: Publish via changesets
        id: publish
        if: needs.check.outputs.hasChangesets == 'false'
        uses: changesets/action@v1
        with:
          # Skip `pnpm release` (which would re-run `pnpm build` and
          # overwrite the staged prebuilds with a fresh source build for
          # only the ubuntu runner's platform). We've already built the
          # TypeScript output and staged every platform's prebuild above,
          # so we just want changeset to drive `npm publish`.
          publish: pnpm exec changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Attach SBOM to GitHub Release
        # Only run if `changesets/action` actually published a new version
        # AND we managed to generate the SBOM upstream. SBOM is
        # best-effort, so we skip the attach if the generate step failed.
        if: needs.check.outputs.hasChangesets == 'false' && steps.publish.outputs.published == 'true' && steps.sbom.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "Attaching sbom.cdx.json to release ${tag}"
          # --clobber keeps reruns idempotent if we ever have to re-attach
          # after a transient failure.
          gh release upload "${tag}" sbom.cdx.json --clobber

      - name: Trigger post-publish smoke
        # The `release: published` trigger on `post-publish-smoke.yml`
        # does NOT fire for releases that GITHUB_TOKEN (i.e. the
        # changesets/action step above) creates — that's a GitHub safety
        # rail to prevent recursive workflow loops. We explicitly kick the
        # workflow_dispatch here so a fresh release still gets smoked.
        if: needs.check.outputs.hasChangesets == 'false' && steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          echo "Triggering post-publish smoke for fast-leiden@${version}"
          gh workflow run post-publish-smoke.yml -f version="${version}"

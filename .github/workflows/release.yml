name: Release

# Changesets-driven release for a native Node addon.
#
# Two distinct paths on a push to `main`:
#
#   1. There ARE pending changesets in `.changeset/*.md` (and they aren't
#      just the README): this is a feature merge. We open / update the
#      "Version Packages" PR via changesets/action; no publish.
#
#   2. There are NO pending changesets: this is the merge of the Version
#      Packages PR. We build platform prebuilds in parallel, download every
#      artifact into `prebuilds/<platform>-<arch>/`, refuse to publish if
#      any platform from the supported matrix is missing, and only then
#      call `changeset publish` to push the tarball (with all prebuilds)
#      to npm.
#
# Authentication uses npm Trusted Publishers (OIDC) — no NPM_TOKEN is
# required; the `id-token: write` permission below brokers it. Configure
# the package's npm page to trust this repo + workflow before the first
# publish.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Matrix kept in one place so prebuild + publish can't drift apart. Mirror
# this in README "Install model" if you add or remove a target.
#
# PREBUILD_ARTIFACTS is the list of artifact names produced by the
# matrix below — one entry per matrix combination. PREBUILD_DIRS is the
# distinct list of `prebuilds/<dir>/` outputs in the final tarball; Linux
# glibc + musl share a directory (libc tag goes in the filename via
# prebuildify --tag-libc), so the two lists differ in length.
env:
  PREBUILD_ARTIFACTS: "linux-x64-glibc linux-x64-musl linux-arm64-glibc linux-arm64-musl darwin-arm64 darwin-x64 win32-x64"
  PREBUILD_DIRS: "linux-x64 linux-arm64 darwin-arm64 darwin-x64 win32-x64"

jobs:
  check:
    name: Check release readiness
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.check.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          # A non-README .md under .changeset/ means a release is queued
          # behind a Version Packages PR. No file means the PR has been
          # merged and we're ready to publish.
          pending="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | head -n 1 || true)"
          if [ -n "${pending}" ]; then
            echo "hasChangesets=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets present: ${pending}"
          else
            echo "hasChangesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — release path"
          fi

  release-pr:
    name: Open / update Release PR
    needs: check
    if: needs.check.outputs.hasChangesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          # Empty publish: this run only opens / updates the Version
          # Packages PR. The actual publish happens on the next push to
          # main (the merge of that PR), via the prebuild + publish jobs
          # below.
          publish: ""
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prebuild:
    # The job is NOT gated by `if:` at the job level — that would skip
    # matrix expansion and GitHub's UI would show a literal
    # `Prebuild ${{ matrix.target }}` row, which is confusing. Instead we
    # always run the matrix and gate the actual work at the step level.
    # On Release-PR runs (hasChangesets='true') every step is skipped and
    # the runner spends ~10s spinning up and quitting per matrix entry —
    # cheap compared to the alternative of an opaque UI.
    name: Prebuild ${{ matrix.artifact }}
    needs: check
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      # Any platform missing aborts the publish — we never want to ship a
      # tarball with a hole in the prebuild matrix that silently falls
      # through to source build on consumer machines.
      fail-fast: true
      matrix:
        include:
          # `artifact` is the per-target artifact name and also the row
          # label in the GitHub UI. `target` is the prebuilds/<target>/
          # directory prebuildify writes into; glibc and musl Linux builds
          # share a directory but their filenames diverge via --tag-libc.
          - artifact: linux-x64-glibc
            os: ubuntu-latest
            container: ""
            target: linux-x64
            libc: glibc
          - artifact: linux-x64-musl
            os: ubuntu-latest
            container: node:22-alpine
            target: linux-x64
            libc: musl
          - artifact: linux-arm64-glibc
            os: ubuntu-24.04-arm
            container: ""
            target: linux-arm64
            libc: glibc
          - artifact: linux-arm64-musl
            os: ubuntu-24.04-arm
            container: node:22-alpine
            target: linux-arm64
            libc: musl
          - artifact: darwin-arm64
            os: macos-latest
            container: ""
            target: darwin-arm64
            libc: ""
          - artifact: darwin-x64
            os: macos-13
            container: ""
            target: darwin-x64
            libc: ""
          - artifact: win32-x64
            os: windows-latest
            container: ""
            target: win32-x64
            libc: ""
    steps:
      - name: Note Release-PR path (skipping prebuild)
        if: needs.check.outputs.hasChangesets == 'true'
        shell: bash
        run: |
          echo "Pending changesets exist; this run only opens the Release PR."
          echo "No prebuild for ${{ matrix.artifact }} on this push."

      # Alpine doesn't ship the build toolchain prebuildify needs. Install
      # them before the rest of the actions run — pnpm/action-setup pulls
      # in via curl which also needs the package manager seeded.
      - name: Install Alpine build deps
        if: needs.check.outputs.hasChangesets == 'false' && matrix.libc == 'musl'
        shell: sh
        run: |
          apk add --no-cache \
            bash \
            build-base \
            cmake \
            git \
            linux-headers \
            python3 \
            curl

      - uses: actions/checkout@v4
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        if: needs.check.outputs.hasChangesets == 'false'

      - uses: actions/setup-node@v4
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          node-version: 22
          cache: pnpm

      # Windows runners don't include bison / flex. See the matching
      # step in ci.yml for the full rationale.
      - name: Install bison + flex (Windows)
        if: needs.check.outputs.hasChangesets == 'false' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install --no-progress -y winflexbison3
          $tool = (Get-ChildItem -Path "$env:ChocolateyInstall\lib\winflexbison3\tools" -Filter "win_bison.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $tool) { throw "win_bison.exe not found after install" }
          $dir = Split-Path $tool
          echo "BISON_EXECUTABLE=$dir\win_bison.exe" >> $env:GITHUB_ENV
          echo "FLEX_EXECUTABLE=$dir\win_flex.exe"  >> $env:GITHUB_ENV
          echo "$dir" >> $env:GITHUB_PATH

      - run: pnpm install --frozen-lockfile --ignore-scripts
        if: needs.check.outputs.hasChangesets == 'false'

      - name: Build prebuild
        if: needs.check.outputs.hasChangesets == 'false'
        env:
          # When this is a libc-tagged build, point prebuildify at it so
          # the artifact file lands as `<name>.<libc>.node` and
          # node-gyp-build can pick the right one at runtime.
          PREBUILDIFY_LIBC: ${{ matrix.libc }}
        run: pnpm run prebuild

      - name: Upload prebuild artifact
        if: needs.check.outputs.hasChangesets == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.artifact }}
          path: prebuilds/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to npm
    needs: [check, prebuild]
    # Same pattern as `prebuild`: never gate at the job level, gate at the
    # step level. Skipped Publish-to-npm rows now stay readable in the UI.
    runs-on: ubuntu-latest
    steps:
      - name: Note Release-PR path (skipping publish)
        if: needs.check.outputs.hasChangesets == 'true'
        shell: bash
        run: echo "Pending changesets exist; nothing to publish on this push."

      - uses: actions/checkout@v4
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v4
        if: needs.check.outputs.hasChangesets == 'false'

      - uses: actions/setup-node@v4
        if: needs.check.outputs.hasChangesets == 'false'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
        if: needs.check.outputs.hasChangesets == 'false'

      - name: Build TypeScript output
        if: needs.check.outputs.hasChangesets == 'false'
        run: pnpm build:ts

      - name: Download every prebuild artifact
        if: needs.check.outputs.hasChangesets == 'false'
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-staging
          pattern: prebuild-*

      - name: Stage prebuilds at prebuilds/<dir>/
        if: needs.check.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p prebuilds
          for d in prebuilds-staging/prebuild-*/; do
            artifact="${d#prebuilds-staging/prebuild-}"
            artifact="${artifact%/}"
            # Strip libc suffix from the artifact name to get the directory
            # prebuilds/<dir>/ that node-gyp-build resolves at runtime.
            # glibc + musl share a directory; libc tag is in the filename.
            target="${artifact%-glibc}"
            target="${target%-musl}"
            mkdir -p "prebuilds/${target}"
            mv "${d}"* "prebuilds/${target}/"
          done
          ls -la prebuilds/

      - name: Verify every artifact + directory is present
        if: needs.check.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          # Every matrix entry must have produced a non-empty artifact.
          for artifact in $PREBUILD_ARTIFACTS; do
            if ! ls "prebuilds-staging/prebuild-${artifact}/"*.node >/dev/null 2>&1; then
              echo "MISSING artifact: prebuild-${artifact}"
              missing=1
            fi
          done
          # Every published <prebuilds/dir>/ must end up with at least one
          # .node file after staging. Catches a future rename mismatch in
          # the staging step.
          for dir in $PREBUILD_DIRS; do
            if ! ls "prebuilds/${dir}"/*.node >/dev/null 2>&1; then
              echo "MISSING staged prebuilds/${dir}/"
              missing=1
            fi
          done
          # Linux x64 and Linux arm64 must each carry BOTH a glibc and a
          # musl binary so musl consumers (Alpine, distroless musl) don't
          # silently fall through to the source build on either arch.
          for arch in x64 arm64; do
            if ! ls "prebuilds/linux-${arch}"/*.musl.node >/dev/null 2>&1; then
              echo "MISSING musl-tagged binary under prebuilds/linux-${arch}/"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "Refusing to publish: prebuild matrix is incomplete."
            exit 1
          fi
          echo "All artifacts present: ${PREBUILD_ARTIFACTS}"
          echo "All directories present: ${PREBUILD_DIRS}"

      - name: Inspect tarball contents (sanity check)
        if: needs.check.outputs.hasChangesets == 'false'
        run: |
          pnpm pack --pack-destination /tmp
          ls -la /tmp/fast-leiden-*.tgz
          tar -tzf /tmp/fast-leiden-*.tgz | grep '^package/prebuilds/'

      - name: Generate SBOM (CycloneDX)
        if: needs.check.outputs.hasChangesets == 'false'
        # Produces a CycloneDX 1.5 JSON for the production dependency tree.
        # The SBOM is uploaded as a workflow artifact below; we also attach
        # it to the GitHub Release via changesets/action's
        # `createGithubReleases: true` (which keys off the version tag and
        # picks up release assets in the runner workspace at publish time).
        run: |
          set -euo pipefail
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --omit dev \
            --output-format JSON \
            --output-file sbom.cdx.json
          ls -la sbom.cdx.json
          # Echo a short summary into the job log so reviewers can sanity
          # check what landed in the SBOM without downloading the artifact.
          node -e "const s=require('./sbom.cdx.json'); console.log('SBOM components:', (s.components||[]).length, 'serial:', s.serialNumber);"

      - name: Upload SBOM artifact
        if: needs.check.outputs.hasChangesets == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cdx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 365

      - name: Publish via changesets
        if: needs.check.outputs.hasChangesets == 'false'
        uses: changesets/action@v1
        with:
          # Skip `pnpm release` (which would re-run `pnpm build` and
          # overwrite the staged prebuilds with a fresh source build for
          # only the ubuntu runner's platform). We've already built the
          # TypeScript output and staged every platform's prebuild above,
          # so we just want changeset to drive `npm publish`.
          publish: pnpm exec changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

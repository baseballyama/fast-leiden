name: Prebuilds (manual)

# Build a platform-specific prebuilt binary for each supported runner and
# upload it as an artifact, then run a tarball-install smoke test on each
# platform.
#
# This workflow is for **manual verification only** — the real publish path
# lives in `release.yml`, which runs the same prebuild matrix on every push
# to `main` once the Version Packages PR is merged. Use this workflow when
# you want to exercise the prebuild pipeline without going through a full
# release (e.g., after touching `scripts/prebuild.mjs` or `binding.gyp`).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prebuild:
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          # darwin-x64 dropped: macos-13 runner retired by GitHub.
          - os: windows-latest
            target: win32-x64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Windows runners don't ship bison / flex; see ci.yml for the full
      # rationale.
      - name: Install bison + flex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install --no-progress -y winflexbison3
          $tool = (Get-ChildItem -Path "$env:ChocolateyInstall\lib\winflexbison3\tools" -Filter "win_bison.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $tool) { throw "win_bison.exe not found after install" }
          $dir = Split-Path $tool
          echo "BISON_EXECUTABLE=$dir\win_bison.exe" >> $env:GITHUB_ENV
          echo "FLEX_EXECUTABLE=$dir\win_flex.exe"  >> $env:GITHUB_ENV
          echo "$dir" >> $env:GITHUB_PATH

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build prebuild
        run: pnpm run prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 30

  smoke:
    name: Smoke ${{ matrix.target }}
    needs: prebuild
    runs-on: ${{ matrix.os }}
    # Pull each platform's freshly-built prebuild back in and verify the
    # tarball install picks it up via node-gyp-build (skipping the source
    # build entirely). This is the test that catches "prebuild was built but
    # node-gyp-build can't find it" — a class of bug that only shows up in
    # tarball-install mode.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          # darwin-x64 dropped: macos-13 runner retired by GitHub.
          - os: windows-latest
            target: win32-x64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build TypeScript output (needed for the tarball)
        run: pnpm build:ts

      - name: Download platform prebuild
        uses: actions/download-artifact@v8
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/

      - name: Pack tarball
        id: pack
        shell: bash
        run: |
          tarball="$(pnpm pack | tail -n 1)"
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Install tarball into a fresh project (no build toolchain)
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y
          # The tarball ships no install hook and no source. If the prebuild
          # under prebuilds/<target>/ isn't picked up by node-gyp-build, the
          # smoke test below fails at require() time.
          npm install "${{ steps.pack.outputs.tarball }}"

      - name: Smoke test the installed package
        shell: bash
        run: |
          cd "$RUNNER_TEMP/consumer"
          cat > smoke.mjs <<'EOF'
          import { leiden, version } from "fast-leiden";
          if (!/^\d+\.\d+\.\d+/.test(version())) process.exit(1);
          const r = leiden({
            nodeCount: 6,
            sources: new Uint32Array([0, 1, 0, 3, 4, 3, 2]),
            targets: new Uint32Array([1, 2, 2, 4, 5, 5, 5]),
            seed: 42,
          });
          if (r.membership.length !== 6) process.exit(1);
          if (r.membership[0] === r.membership[3]) process.exit(1);
          console.log("prebuild smoke OK");
          EOF
          node smoke.mjs

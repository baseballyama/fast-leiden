name: CI

# Quality gate for fast-leiden. The project is a native Node.js addon that
# wraps igraph + libleidenalg, so CI needs to (a) check out the upstream
# submodules, (b) build the C/C++ deps via CMake, and (c) build the addon
# itself on every supported Node.js version.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache vendor build-deps
        uses: actions/cache@v4
        with:
          path: vendor/build-deps
          key: ${{ runner.os }}-build-deps-${{ hashFiles('.gitmodules', 'scripts/build-deps.mjs') }}-${{ hashFiles('vendor/igraph/CMakeLists.txt', 'vendor/libleidenalg/CMakeLists.txt') }}

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build (deps + native addon + TypeScript)
        run: pnpm build

      - name: Coverage (gate ≥ 85% lines)
        # The threshold is enforced by `vitest run --coverage`; it exits
        # non-zero if any of (lines / statements / functions / branches)
        # falls below the bar in `vitest.config.ts`.
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  test:
    name: Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    # No `needs: static` — GitHub Actions does not expand a matrix when the
    # dependent job is skipped, so a `static` failure (format / lint /
    # typecheck) would collapse the entire matrix into one literal
    # `Test (Node ${{ matrix.node-version }} / ${{ matrix.os }}) — Skipped`
    # row. Running the matrix in parallel with `static` costs a few extra
    # minutes per failed push but keeps the run page readable.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22", "24", "26"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # Windows runners don't ship bison / flex. igraph's
      # src/CMakeLists.txt unconditionally calls bison_target() /
      # flex_target() when the pre-generated parser sources aren't
      # present (they aren't, in upstream's submodule), so without
      # these tools the configure step dies with
      # `Unknown CMake command "bison_target"`. winflexbison3 provides
      # both `win_bison` and `win_flex`; we point CMake at them through
      # env vars FindBISON / FindFLEX honour.
      - name: Install bison + flex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install --no-progress -y winflexbison3
          $tool = (Get-ChildItem -Path "$env:ChocolateyInstall\lib\winflexbison3\tools" -Filter "win_bison.exe" -Recurse | Select-Object -First 1).FullName
          if (-not $tool) { throw "win_bison.exe not found after install" }
          $dir = Split-Path $tool
          echo "BISON_EXECUTABLE=$dir\win_bison.exe" >> $env:GITHUB_ENV
          echo "FLEX_EXECUTABLE=$dir\win_flex.exe"  >> $env:GITHUB_ENV
          echo "$dir" >> $env:GITHUB_PATH

      - name: Cache vendor build-deps
        uses: actions/cache@v4
        with:
          path: vendor/build-deps
          key: ${{ runner.os }}-build-deps-${{ hashFiles('.gitmodules', 'scripts/build-deps.mjs') }}-${{ hashFiles('vendor/igraph/CMakeLists.txt', 'vendor/libleidenalg/CMakeLists.txt') }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # Perf regression gate. The bench is small (~5K nodes / ~30K
      # edges) so the matrix as a whole stays under a few seconds, but
      # a 5× regression in the inner loop would still trip the budget.
      # Soak (`.github/workflows/soak.yml`) handles the large-graph
      # signal weekly; this is the "every PR" early warning.
      - name: Perf gate
        run: pnpm perf-gate

  sanitizers:
    name: Sanitizers (ASan + UBSan, Linux)
    runs-on: ubuntu-latest
    # The sanitizers job is the safety net for the C/C++ boundary. We rebuild
    # the addon with -fsanitize=address,undefined and run the regular test
    # suite under LD_PRELOAD'd libasan so any out-of-bounds write or undefined
    # behaviour from a malformed CSR / edge-list input surfaces here.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Cache vendor build-deps (sanitizers)
        uses: actions/cache@v4
        with:
          path: vendor/build-deps
          key: ${{ runner.os }}-build-deps-san-${{ hashFiles('.gitmodules', 'scripts/build-deps.mjs') }}-${{ hashFiles('vendor/igraph/CMakeLists.txt', 'vendor/libleidenalg/CMakeLists.txt') }}

      - run: pnpm install --frozen-lockfile

      - name: Build vendor deps + native addon with ASan/UBSan
        env:
          CFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          CXXFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          LDFLAGS: "-fsanitize=address,undefined"
        run: |
          pnpm build:deps
          pnpm build:native
          pnpm build:ts

      - name: Run tests under ASan/UBSan
        env:
          # Node was not built with sanitizers, so LD_PRELOAD the runtime.
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libasan.so.8
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1:strict_string_checks=1:detect_stack_use_after_return=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: pnpm test

  pack-install:
    name: Tarball install (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    # The other jobs run against the source tree. This one validates the actual
    # artifact that ships to npm — `pnpm pack` produces the same tarball npm
    # would download, then a fresh empty project installs from it. Catches
    # `files` mis-globs, install-hook ordering bugs, and missing vendor sources
    # that show up only in tarball-install mode.
    # `needs: static` is intentionally omitted — see the `test` job comment.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TypeScript output (needed for the tarball)
        run: pnpm build:ts

      - name: Pack tarball
        id: pack
        shell: bash
        run: |
          tarball="$(pnpm pack | tail -n 1)"
          echo "tarball=$(pwd)/${tarball}" >> "$GITHUB_OUTPUT"

      - name: Install tarball into a fresh project
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y
          npm install --foreground-scripts "${{ steps.pack.outputs.tarball }}"

      - name: Smoke test the installed package
        shell: bash
        run: |
          cd "$RUNNER_TEMP/consumer"
          cat > smoke.mjs <<'EOF'
          import { leiden, version } from "fast-leiden";
          const v = version();
          if (typeof v !== "string" || !/^\d+\.\d+\.\d+/.test(v)) {
            console.error("unexpected version:", v);
            process.exit(1);
          }
          const r = leiden({
            nodeCount: 6,
            sources: new Uint32Array([0, 1, 0, 3, 4, 3, 2]),
            targets: new Uint32Array([1, 2, 2, 4, 5, 5, 5]),
            seed: 42,
          });
          if (r.membership.length !== 6) {
            console.error("unexpected membership length:", r.membership.length);
            process.exit(1);
          }
          if (r.membership[0] === r.membership[3]) {
            console.error("two triangles collapsed to one community");
            process.exit(1);
          }
          console.log("tarball smoke OK; version=" + v);
          EOF
          node smoke.mjs

      - name: Assert deep imports are blocked by exports
        shell: bash
        run: |
          cd "$RUNNER_TEMP/consumer"
          cat > deep-import.mjs <<'EOF'
          try {
            await import("fast-leiden/dist/native.js");
            console.error("expected deep import to be blocked by exports");
            process.exit(1);
          } catch (e) {
            if (e && e.code === "ERR_PACKAGE_PATH_NOT_EXPORTED") {
              console.log("deep import blocked as expected");
              process.exit(0);
            }
            console.error("unexpected error:", e);
            process.exit(1);
          }
          EOF
          node deep-import.mjs
